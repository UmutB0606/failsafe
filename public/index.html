<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FailSafe — Payment Recovery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#22c55e;--bg:#0a0f0a;--card:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.07);--muted:#4a5568;--text:#e2e8f0;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:'DM Mono','Courier New',monospace;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(34,197,94,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(34,197,94,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.wrap{max-width:1000px;margin:0 auto;padding:32px 16px}
/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid rgba(34,197,94,0.15)}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(34,197,94,0.3)}
.logo-text{font-size:22px;font-weight:700;letter-spacing:3px;color:var(--g)}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:1px}
.badge{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:20px;padding:6px 14px;font-size:11px;color:var(--g);font-weight:700;letter-spacing:1px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.green::before{background:var(--g)}
.stat.red::before{background:var(--red)}
.stat.blue::before{background:#3b82f6}
.stat-val{font-size:28px;font-weight:700;color:#fff;margin-bottom:4px}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:2px}
/* TABLE */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;letter-spacing:2px;color:var(--muted)}
.btn-refresh{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:11px;color:var(--muted);transition:all .2s}
.btn-refresh:hover{border-color:var(--g);color:var(--g)}
table{width:100%;border-collapse:collapse}
th{padding:10px 20px;text-align:left;font-size:10px;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:400}
td{padding:14px 20px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.01)}
.badge-ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:var(--g);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.badge-fail{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.badge-pending{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.2);color:#eab308;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
/* TEST PANEL */
.test-panel{background:rgba(34,197,94,0.03);border:1px solid rgba(34,197,94,0.15);border-radius:14px;padding:20px}
.test-title{font-size:10px;color:var(--g);letter-spacing:2px;margin-bottom:14px}
.test-row{display:grid;grid-template-columns:1fr 1fr 120px auto;gap:8px}
input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:100%;transition:border-color .2s}
input:focus{border-color:rgba(34,197,94,0.4)}
.btn-test{background:var(--g);border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:#0a0f0a;white-space:nowrap;transition:all .2s}
.btn-test:hover{opacity:.85;transform:translateY(-1px)}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}
/* TOAST */
.toast{position:fixed;top:20px;right:20px;z-index:999;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;display:none}
.toast.show{display:block;animation:slideIn .3s ease}
.toast.s{background:var(--g);color:#0a0f0a}
.toast.e{background:var(--red);color:#fff}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <div>
        <div class="logo-text">FAILSAFE</div>
        <div class="logo-sub">Payment Recovery Dashboard</div>
      </div>
    </div>
    <div class="badge">LIVE</div>
  </div>

  <div class="stats">
    <div class="stat green">
      <div class="stat-val" id="sRecovered">$0.00</div>
      <div class="stat-lbl">RECOVERED</div>
    </div>
    <div class="stat red">
      <div class="stat-val" id="sLost">$0.00</div>
      <div class="stat-lbl">AT RISK</div>
    </div>
    <div class="stat blue">
      <div class="stat-val" id="sTotal">0</div>
      <div class="stat-lbl">TOTAL CASES</div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="card-title">RECOVERY CASES</span>
      <button class="btn-refresh" onclick="load()">↻ Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>CUSTOMER</th>
          <th>EMAIL</th>
          <th>AMOUNT</th>
          <th>EMAIL SENT</th>
          <th>STATUS</th>
          <th>DATE</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="empty">No failed payments yet. Test below ↓</td></tr>
      </tbody>
    </table>
  </div>

  <div class="test-panel">
    <div class="test-title">🧪 TEST — Simulate Failed Payment</div>
    <div class="test-row">
      <input id="tEmail" placeholder="customer@email.com">
      <input id="tName" placeholder="Customer Name">
      <input id="tAmount" placeholder="Amount ($)" type="number">
      <button class="btn-test" onclick="sendTest()">SEND TEST</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
async function load() {
  const res = await fetch('/api/recoveries');
  const data = await res.json();

  document.getElementById('sRecovered').textContent = '$' + (data.totalRecovered/100).toFixed(2);
  document.getElementById('sLost').textContent = '$' + (data.totalLost/100).toFixed(2);
  document.getElementById('sTotal').textContent = data.list.length;

  const tbody = document.getElementById('tbody');
  if (!data.list.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No failed payments yet. Test below ↓</td></tr>';
    return;
  }

  tbody.innerHTML = data.list.map(r => `
    <tr>
      <td>${esc(r.customerName)}</td>
      <td style="color:#94a3b8">${esc(r.email)}</td>
      <td style="font-weight:700">$${(r.amount/100).toFixed(2)} ${r.currency.toUpperCase()}</td>
      <td style="color:#94a3b8">Day ${r.lastEmailDay || '—'}</td>
      <td>${r.recovered
        ? '<span class="badge-ok">✓ RECOVERED</span>'
        : r.lastEmailDay >= 7
          ? '<span class="badge-fail">⚠ FINAL NOTICE</span>'
          : '<span class="badge-pending">⏳ IN PROGRESS</span>'
      }</td>
      <td style="color:#4a5568;font-size:11px">${new Date(r.createdAt).toLocaleDateString()}</td>
    </tr>
  `).join('');
}

async function sendTest() {
  const email = document.getElementById('tEmail').value;
  const name = document.getElementById('tName').value;
  const amount = parseFloat(document.getElementById('tAmount').value) * 100;
  if (!email) return toast('Email zorunlu!', 'e');

  const res = await fetch('/api/test', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ email, name, amount: amount || 2900 })
  });

  if (res.ok) {
    toast('Test email gönderildi! ✓');
    setTimeout(load, 1000);
  } else {
    toast('Hata oluştu', 'e');
  }
}

function esc(s) { return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type='s') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2500);
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
